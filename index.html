<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-prophet-</title>
<meta name="description" content="you found this for a reason.">
<meta property="og:title" content="-prophet-">
<meta property="og:description" content="you found this for a reason.">
<meta property="og:url" content="https://prophetart.xyz">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@ProphetART92">
<meta name="twitter:title" content="-prophet-">
<meta name="twitter:description" content="you found this for a reason.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #050505;
    --surface: #0a0a0a;
    --border: #111111;
    --text: #d4d4c8;
    --muted: #2a2a2a;
    --faint: #141414;
    --accent: #ffffff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  ::selection {
    background: var(--text);
    color: var(--bg);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--muted); }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,5,5,0.92);
    backdrop-filter: blur(8px);
  }

  .logo {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--text);
    cursor: pointer;
    transition: letter-spacing 0.4s ease;
    user-select: none;
    animation: flicker 9s infinite;
  }

  .logo:hover { letter-spacing: 0.9em; }

  @keyframes flicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95% { opacity: 0.2; }
    97% { opacity: 0.7; }
    99% { opacity: 0.4; }
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links li {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--muted);
    cursor: pointer;
    text-transform: lowercase;
    transition: color 0.2s, letter-spacing 0.3s;
    user-select: none;
    position: relative;
  }

  .nav-links li:hover {
    color: var(--text);
    letter-spacing: 0.8em;
  }

  /* HERO */
  .hero {
    min-height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 72px 48px 56px;
    text-align: center;
    position: relative;
    border-bottom: 0.5px solid var(--border);
  }

  .static-line {
    font-size: 8px;
    letter-spacing: 0.5em;
    color: var(--faint);
    margin-bottom: 40px;
    user-select: none;
    font-style: italic;
  }

  .countdown {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: default;
  }

  .cd-num {
    font-size: 64px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    min-width: 80px;
    text-align: center;
    transition: color 0.2s, transform 0.3s;
    user-select: none;
    letter-spacing: -0.02em;
  }

  .cd-unit:hover .cd-num {
    color: var(--accent);
    transform: scale(1.06);
  }

  .cd-lbl {
    font-size: 7px;
    letter-spacing: 0.6em;
    color: var(--muted);
    text-transform: lowercase;
    transition: color 0.2s, letter-spacing 0.4s;
    user-select: none;
  }

  .cd-unit:hover .cd-lbl {
    color: #555;
    letter-spacing: 1em;
  }

  .cd-sep {
    font-size: 56px;
    color: var(--faint);
    padding-top: 4px;
    user-select: none;
    font-weight: 700;
  }

  .tagline {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: color 0.3s, letter-spacing 0.4s;
    margin-top: 4px;
  }

  .tagline:hover {
    color: var(--text);
    letter-spacing: 0.9em;
  }

  /* COLLECTION */
  .col-header {
    padding: 40px 48px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .col-name {
    font-size: 9px;
    letter-spacing: 0.6em;
    color: var(--muted);
    cursor: pointer;
    text-transform: lowercase;
    transition: color 0.2s, letter-spacing 0.4s;
    user-select: none;
  }

  .col-name:hover {
    color: #666;
    letter-spacing: 1em;
  }

  .col-morse {
    font-size: 8px;
    color: var(--faint);
    letter-spacing: 0.2em;
    user-select: none;
    transition: color 0.3s;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 3px;
    padding: 0 48px 72px;
  }

  .piece {
    aspect-ratio: 3/4;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 0.5px solid var(--faint);
    transition: border-color 0.3s;
  }

  .piece:hover {
    border-color: var(--muted);
  }

  .piece-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    transition: background 0.4s;
  }

  .piece:hover .piece-inner {
    background: #0e0e0e;
  }

  .piece img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.9;
    transition: opacity 0.3s, transform 0.6s ease;
    position: absolute;
    inset: 0;
  }

  .piece:hover img {
    opacity: 0.7;
    transform: scale(1.03);
  }

  .piece-ghost {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--faint);
    user-select: none;
    transition: opacity 0.3s;
    z-index: 1;
  }

  .piece:hover .piece-ghost { opacity: 0; }

  .piece-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    background: rgba(5,5,5,0.82);
    z-index: 2;
  }

  .piece:hover .piece-overlay { opacity: 1; }

  .piece-label {
    font-size: 7px;
    letter-spacing: 0.6em;
    color: #3a3a3a;
    text-transform: lowercase;
    user-select: none;
    transition: letter-spacing 0.4s, color 0.3s;
  }

  .piece:hover .piece-label {
    letter-spacing: 0.9em;
    color: #666;
  }

  .piece-number {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    user-select: none;
    transition: transform 0.3s, color 0.2s;
    letter-spacing: 0.05em;
  }

  .piece:hover .piece-number {
    transform: scale(1.08);
    color: var(--accent);
  }

  .piece-cta {
    font-size: 7px;
    letter-spacing: 0.5em;
    color: #2a2a2a;
    text-transform: lowercase;
    user-select: none;
    transition: color 0.3s, letter-spacing 0.3s;
  }

  .piece:hover .piece-cta {
    color: #555;
    letter-spacing: 0.8em;
  }

  .piece.active .piece-overlay { background: rgba(12,12,12,0.92); }
  .piece.active .piece-number { color: var(--accent); }
  .piece.active .piece-cta { color: #888; }

  /* FOOTER */
  footer {
    padding: 32px 48px;
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-left {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--faint);
    cursor: pointer;
    user-select: none;
    transition: color 0.3s, letter-spacing 0.4s;
  }

  .footer-left:hover {
    color: var(--text);
    letter-spacing: 0.9em;
  }

  .footer-right {
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--faint);
    user-select: none;
  }

  .hero-links {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    align-items: center;
  }

  .mint-btn {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.5em;
    color: var(--muted);
    text-decoration: none;
    text-transform: lowercase;
    border: 0.5px solid #1a1a1a;
    padding: 10px 20px;
    transition: color 0.3s, border-color 0.3s, letter-spacing 0.3s;
    cursor: pointer;
    background: transparent;
  }

  .mint-btn:hover {
    color: var(--text);
    border-color: #3a3a3a;
    letter-spacing: 0.8em;
  }

  .x-link {
    font-size: 8px;
    letter-spacing: 0.5em;
    color: #1e1e1e;
    text-decoration: none;
    text-transform: lowercase;
    transition: color 0.3s, letter-spacing 0.3s;
    cursor: pointer;
  }

  .x-link:hover {
    color: #555;
    letter-spacing: 0.8em;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .hero { padding: 48px 24px 40px; }
    .cd-num { font-size: 40px; min-width: 52px; }
    .cd-sep { font-size: 36px; }
    .countdown { gap: 12px; }
    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 0 24px 48px;
    }
    .col-header { padding: 28px 24px 16px; }
    footer { padding: 24px; }
  }

  @media (max-width: 480px) {
    .cd-num { font-size: 30px; min-width: 38px; }
    .cd-sep { font-size: 26px; }
    .countdown { gap: 8px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo" id="logo">-prophet-</div>
  <ul class="nav-links">
    <li data-label="origins" data-alt="i">i</li>
    <li data-label="garden" data-alt="ii">ii</li>
    <li data-label="???" data-alt="iii">iii</li>
  </ul>
</nav>

<section class="hero">
  <div class="static-line" id="static-line">· · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·</div>
  <div class="countdown">
    <div class="cd-unit">
      <div class="cd-num" id="cd-d">00</div>
      <div class="cd-lbl" id="lbl-d">days</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-num" id="cd-h">00</div>
      <div class="cd-lbl" id="lbl-h">hours</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-num" id="cd-m">00</div>
      <div class="cd-lbl" id="lbl-m">minutes</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-num" id="cd-s">00</div>
      <div class="cd-lbl" id="lbl-s">seconds</div>
    </div>
  </div>
  <div class="tagline" id="tagline">you found this for a reason.</div>
  <div class="hero-links">
    <a class="mint-btn" href="https://www.transient.xyz/mint/-prophet-origins" target="_blank" rel="noopener">collect origins →</a>
    <a class="x-link" href="https://x.com/ProphetART92" target="_blank" rel="noopener">@prophetart92</a>
  </div>
</section>

<div class="col-header">
  <div class="col-name" id="col-name">origins</div>
  <div class="col-morse" id="morse">· · ·</div>
</div>

<div class="grid" id="grid"></div>

<footer>
  <div class="footer-left" id="footer-txt">-prophet-</div>
  <div class="footer-right">2026</div>
</footer>

<script>
// ─── SCRAMBLE ───────────────────────────────────────────────────
const CHARS = '!@#$%^&*x01█▓░|/\\?~`—·';

function scramble(el, final, ms) {
  let i = 0;
  clearInterval(el._scr);
  el._scr = setInterval(() => {
    el.textContent = final.split('').map((c, idx) => {
      if (idx < i) return c;
      return c === ' ' ? ' ' : CHARS[Math.floor(Math.random() * CHARS.length)];
    }).join('');
    i++;
    if (i > final.length) {
      el.textContent = final;
      clearInterval(el._scr);
    }
  }, ms / final.length);
}

// ─── LOGO ────────────────────────────────────────────────────────
const logo = document.getElementById('logo');
logo.addEventListener('mouseenter', () => scramble(logo, '-prophet-', 500));

// ─── NAV LINKS ───────────────────────────────────────────────────
document.querySelectorAll('.nav-links li').forEach(li => {
  const orig = li.dataset.alt;
  const label = li.dataset.label;
  li.addEventListener('mouseenter', () => scramble(li, label, 300));
  li.addEventListener('mouseleave', () => scramble(li, orig, 300));
});

// ─── TAGLINE CYCLE ───────────────────────────────────────────────
const taglines = [
  'you found this for a reason.',
  'it was always going to be you.',
  '13 signals. no explanation.',
  'the garden remembers.',
  'do not look away.',
  'something left this here.',
  'origins do not forgive.',
  'the 13th always comes.',
];
let tIdx = 0;
const tagline = document.getElementById('tagline');
tagline.addEventListener('click', () => {
  tIdx = (tIdx + 1) % taglines.length;
  scramble(tagline, taglines[tIdx], 500);
});

// ─── COLLECTION NAME ─────────────────────────────────────────────
const colName = document.getElementById('col-name');
colName.addEventListener('mouseenter', () => scramble(colName, 'origins', 300));

// ─── FOOTER CYCLE ────────────────────────────────────────────────
const footerLines = ['-prophet-', 'anonymous.', 'the 13th.', 'you were warned.', 'still here.', 'origins.'];
let fIdx = 0;
const footerTxt = document.getElementById('footer-txt');
footerTxt.addEventListener('click', () => {
  fIdx = (fIdx + 1) % footerLines.length;
  scramble(footerTxt, footerLines[fIdx], 400);
});

// ─── COUNTDOWN LABELS ────────────────────────────────────────────
const altLbls = ['rotations', 'signals', 'heartbeats', 'ticks'];
const origLbls = ['days', 'hours', 'minutes', 'seconds'];
const lblIds = ['lbl-d', 'lbl-h', 'lbl-m', 'lbl-s'];
document.querySelectorAll('.cd-unit').forEach((unit, i) => {
  const lbl = document.getElementById(lblIds[i]);
  unit.addEventListener('mouseenter', () => scramble(lbl, altLbls[i], 300));
  unit.addEventListener('mouseleave', () => scramble(lbl, origLbls[i], 300));
});

// ─── COUNTDOWN CLOCK ─────────────────────────────────────────────
function nextDrop() {
  const now = new Date();
  let t = new Date(now.getFullYear(), now.getMonth(), 13, 13, 0, 0, 0);
  if (now >= t) t = new Date(now.getFullYear(), now.getMonth() + 1, 13, 13, 0, 0, 0);
  return t;
}

function tick() {
  const diff = nextDrop() - new Date();
  if (diff < 0) return;
  document.getElementById('cd-d').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
  document.getElementById('cd-h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
}
tick();
setInterval(tick, 1000);

// ─── AMBIENT STATIC ──────────────────────────────────────────────
const staticLine = document.getElementById('static-line');
const staticChars = '·—░▒|/\\!▓ ';
setInterval(() => {
  if (Math.random() > 0.8) {
    staticLine.textContent = Array.from({ length: 42 }, () =>
      Math.random() > 0.65
        ? staticChars[Math.floor(Math.random() * staticChars.length)]
        : '·'
    ).join(' ');
  }
}, 220);

// ─── MORSE SIGNAL ────────────────────────────────────────────────
const morseEl = document.getElementById('morse');
const morsePatterns = ['· · ·', '— · —', '· — ·', '— — —', '· · · ·', '— ·', '· —'];
setInterval(() => {
  morseEl.textContent = morsePatterns[Math.floor(Math.random() * morsePatterns.length)];
}, 1600);

// ─── PIECE GRID ───────────────────────────────────────────────────
// TO ADD YOUR IMAGES: replace the empty string in the images array
// with the filename of your image e.g. 'images/001.jpg'
// Put your images in an /images folder in the same directory as index.html

const images = [
  '', '', '', '', '', '', '', '', '', '', '', '', ''
  // example: 'images/origins-001.jpg', 'images/origins-002.jpg', etc.
];

const ctaLines = ['view', 'enter', 'open', 'collect', 'signal'];

const grid = document.getElementById('grid');
for (let n = 1; n <= 13; n++) {
  const num = String(n).padStart(3, '0');
  const src = images[n - 1];

  const piece = document.createElement('div');
  piece.className = 'piece';

  piece.innerHTML = `
    <div class="piece-inner">
      ${src ? `<img src="${src}" alt="origins ${num}" loading="lazy">` : ''}
      <div class="piece-ghost">${num}</div>
    </div>
    <div class="piece-overlay">
      <div class="piece-label">origins</div>
      <div class="piece-number">${num}</div>
      <div class="piece-cta">view</div>
    </div>
  `;

  piece.addEventListener('mouseenter', () => {
    const lbl = piece.querySelector('.piece-label');
    scramble(lbl, 'origins', 250);
  });

  piece.addEventListener('click', () => {
    window.open('https://www.transient.xyz/mint/-prophet-origins', '_blank');
    const cta = piece.querySelector('.piece-cta');
    const lbl = piece.querySelector('.piece-label');
    scramble(cta, ctaLines[Math.floor(Math.random() * ctaLines.length)], 300);
    scramble(lbl, 'origins', 200);
  });

  grid.appendChild(piece);
}
</script>

</body>
</html>
