<html lang="en">
<head>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0e8e0;
  --bg2:#e8ddd4;
  --red:#8b0000;
  --red-mid:#b30000;
  --red-dim:rgba(139,0,0,0.12);
  --red-glow:rgba(139,0,0,0.06);
  --text:#1a1212;
  --muted:#5a4a44;
  --faint:#b8a89e;
  --border:rgba(139,0,0,0.2);
  --ash:#7a6860;
}

html{scroll-behavior:smooth}

body{
  background:transparent;
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  overflow-x:hidden;
  cursor:crosshair;
  min-height:100vh;
}

::selection{background:var(--red);color:var(--bg)}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--red)}

/* CANVAS */
#bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  width:100%;
  height:100%;
}

/* SITE */
.site{position:relative;z-index:1}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 48px;
  border-bottom:0.5px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(240,232,224,0.55);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:0.3em;
  color:var(--text);
  cursor:pointer;
  user-select:none;
  text-decoration:none;
  animation:logo-flicker 11s infinite;
}
.logo:hover{ color:var(--text); }

@keyframes logo-flicker{
  0%,91%,93%,96%,100%{opacity:1}
  92%{opacity:0.3}
  94%{opacity:0.8}
  95%{opacity:0.2}
  97%{opacity:0.9}
}

.nav-symbols{
  display:flex;
  align-items:center;
  gap:24px;
  list-style:none;
}

.nav-sym{
  position:relative;
  font-size:16px;
  color:var(--faint);
  cursor:pointer;
  transition:color 0.2s, font-size 0.2s, transform 0.2s;
  user-select:none;
  text-decoration:none;
  display:inline-block;
  transform-origin:center bottom;
}
.nav-sym:hover{color:var(--red);font-size:22px;transform:translateY(-3px)}

.sym-tip{
  position:absolute;
  bottom:-24px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:0.3em;
  color:var(--red);
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.2s;
  font-family:'Share Tech Mono',monospace;
  text-transform:lowercase;
  pointer-events:none;
}
.nav-sym:hover .sym-tip{opacity:1}

.nav-mint{
  font-size:11px;
  letter-spacing:0.35em;
  color:var(--muted);
  text-decoration:none;
  border:0.5px solid var(--faint);
  padding:7px 14px;
  transition:color 0.2s,border-color 0.2s,background 0.2s,transform 0.2s,letter-spacing 0.2s,padding 0.2s;
  font-family:'Share Tech Mono',monospace;
  text-transform:lowercase;
  display:inline-block;
}
.nav-mint:hover{
  color:var(--red);
  border-color:var(--red);
  background:var(--red-glow);
  transform:scale(1.08);
  letter-spacing:0.55em;
  padding:7px 18px;
}

.nav-x{
  font-size:15px;
  font-weight:700;
  color:var(--muted);
  text-decoration:none;
  transition:color 0.2s,transform 0.2s;
  display:inline-block;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:0;
}
.nav-x:hover{color:var(--red);transform:scale(1.15)}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:80px 48px 60px;
  text-align:center;
  position:relative;
  border-bottom:0.5px solid var(--border);
}

.hero-noise{
  font-size:8px;
  letter-spacing:0.4em;
  color:var(--faint);
  margin-bottom:32px;
  user-select:none;
}

.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,14vw,160px);
  letter-spacing:0.08em;
  line-height:0.9;
  margin-bottom:48px;
  user-select:none;
  text-align:center;
}

.prophet-inner{
  position:relative;
  display:inline-block;
  color:var(--text);
  cursor:default;
}

.prophet-inner::before,
.prophet-inner::after{
  content:'-PROPHET-';
  position:absolute;
  inset:0;
  opacity:0;
  font-family:'Bebas Neue',sans-serif;
  font-size:inherit;
  letter-spacing:inherit;
  pointer-events:none;
  white-space:nowrap;
}
.prophet-inner::before{color:var(--red);left:-2px}
.prophet-inner::after{display:none}

.prophet-inner:hover::before{
  opacity:1;
  animation:title-glitch 0.18s steps(1) infinite;
}

@keyframes title-glitch{
  0%{clip-path:inset(10% 0 78% 0)}
  20%{clip-path:inset(55% 0 22% 0)}
  40%{clip-path:inset(30% 0 60% 0)}
  60%{clip-path:inset(75% 0 8% 0)}
  80%{clip-path:inset(5% 0 88% 0)}
  100%{clip-path:inset(42% 0 45% 0)}
}

/* COUNTDOWN */
.countdown{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:36px;
}

.cd-unit{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:default;
}

.cd-num{
  font-family:'VT323',monospace;
  font-size:clamp(56px,9vw,100px);
  color:var(--red);
  line-height:1;
  min-width:2ch;
  text-align:center;
  user-select:none;
  transition:text-shadow 0.2s;
  letter-spacing:0.02em;
}

.cd-unit:hover .cd-num{
  text-shadow:2px 0 0 rgba(139,0,0,0.4),-2px 0 0 rgba(180,80,80,0.3);
}

.cd-lbl{
  font-size:10px;
  letter-spacing:0.5em;
  color:var(--faint);
  text-transform:lowercase;
  user-select:none;
  transition:color 0.2s,letter-spacing 0.3s;
}
.cd-unit:hover .cd-lbl{color:var(--muted);letter-spacing:0.8em}

.cd-sep{
  font-family:'VT323',monospace;
  font-size:clamp(48px,7vw,84px);
  color:var(--faint);
  padding-top:2px;
  user-select:none;
  animation:sep-pulse 3s infinite;
}

@keyframes sep-pulse{
  0%,100%{opacity:0.3}
  50%{opacity:0.7}
}

.tagline{
  font-size:12px;
  letter-spacing:0.5em;
  color:var(--faint);
  cursor:pointer;
  user-select:none;
  transition:color 0.3s,letter-spacing 0.4s;
  margin-bottom:32px;
  text-transform:lowercase;
}
.tagline:hover{color:var(--text);letter-spacing:0.9em}

.hero-links{
  display:flex;
  gap:20px;
  align-items:center;
}

.mint-hero{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:0.35em;
  color:var(--red);
  text-decoration:none;
  border:0.5px solid var(--red);
  padding:11px 22px;
  text-transform:lowercase;
  transition:background 0.25s,color 0.2s,letter-spacing 0.3s;
  position:relative;
  overflow:hidden;
}

.mint-hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:var(--red);
  transform:translateX(-101%);
  transition:transform 0.25s ease;
  z-index:-1;
}
.mint-hero:hover::before{transform:translateX(0)}
.mint-hero:hover{color:var(--bg);letter-spacing:0.55em}

.x-hero{
  font-size:11px;
  letter-spacing:0.4em;
  color:var(--faint);
  text-decoration:none;
  text-transform:lowercase;
  transition:color 0.2s;
}
.x-hero:hover{color:var(--muted)}

/* DIVIDER */
.red-line{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  opacity:0.3;
}

/* COLLECTION */
.col-section{padding:48px 48px 0}

.col-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.col-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  letter-spacing:0.4em;
  color:var(--text);
  cursor:pointer;
  user-select:none;
}
.col-title .rc.shown{
  color:var(--text) !important;
}

.col-signal{
  font-size:12px;
  letter-spacing:0.3em;
  color:var(--faint);
  user-select:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:4px;
  padding-bottom:72px;
}

.piece{
  aspect-ratio:3/4;
  background:rgba(232,221,212,0.88);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  border:0.5px solid rgba(139,0,0,0.08);
  transition:border-color 0.3s,box-shadow 0.3s;
}

.piece:hover{
  border-color:rgba(139,0,0,0.3);
  box-shadow:0 4px 24px rgba(139,0,0,0.08);
}

.piece-bg{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.piece img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:transform 0.8s ease,filter 0.3s;
}
.piece:hover img{transform:scale(1.04)}

.piece-ghost{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  letter-spacing:0.1em;
  color:var(--faint);
  user-select:none;
  position:relative;
  z-index:1;
  transition:opacity 0.2s;
  display:none;
}

.piece:not(:has(img)) .piece-ghost,
.piece:has(img[src=""]) .piece-ghost {
  display:block;
}

.piece:hover .piece-ghost{opacity:0}

/* GLITCH LAYERS */
.glitch-r,.glitch-c{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:3;
  opacity:0;
}
.glitch-r{background:rgba(139,0,0,0.15);mix-blend-mode:multiply}
.glitch-c{background:rgba(180,120,100,0.1);mix-blend-mode:multiply}

.piece.glitching .glitch-r{
  opacity:1;
  animation:glitch-r 0.25s steps(1) infinite;
}
.piece.glitching .glitch-c{
  opacity:1;
  animation:glitch-c 0.25s steps(1) infinite;
}
.piece.glitching{animation:piece-shake 0.25s steps(1) infinite}

@keyframes piece-shake{
  0%{transform:translate(0,0)}
  20%{transform:translate(-2px,1px)}
  40%{transform:translate(2px,-1px)}
  60%{transform:translate(-1px,2px)}
  80%{transform:translate(1px,-2px)}
  100%{transform:translate(0,0)}
}

@keyframes glitch-r{
  0%{clip-path:inset(12% 0 75% 0);transform:translate(-4px,0)}
  25%{clip-path:inset(58% 0 18% 0);transform:translate(3px,0)}
  50%{clip-path:inset(28% 0 58% 0);transform:translate(-2px,1px)}
  75%{clip-path:inset(78% 0 6% 0);transform:translate(4px,0)}
  100%{clip-path:inset(4% 0 82% 0);transform:translate(-3px,0)}
}

@keyframes glitch-c{
  0%{clip-path:inset(62% 0 22% 0);transform:translate(3px,0)}
  25%{clip-path:inset(8% 0 78% 0);transform:translate(-4px,0)}
  50%{clip-path:inset(42% 0 42% 0);transform:translate(2px,-1px)}
  75%{clip-path:inset(22% 0 66% 0);transform:translate(-3px,0)}
  100%{clip-path:inset(84% 0 4% 0);transform:translate(4px,0)}
}

/* PIECE OVERLAY */
.piece-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  opacity:0;
  transition:opacity 0.25s;
  background:rgba(240,232,224,0.75);
  z-index:2;
  backdrop-filter:blur(2px);
}
.piece:hover .piece-overlay{opacity:1}

.piece-lbl{
  font-size:10px;
  letter-spacing:0.6em;
  color:var(--muted);
  text-transform:lowercase;
  user-select:none;
}

.piece-num-overlay{
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;
  color:var(--text);
  letter-spacing:0.05em;
  user-select:none;
  transition:color 0.2s;
  line-height:1;
}
.piece:hover .piece-num-overlay{color:var(--red)}

/* FOOTER */
footer{
  padding:28px 48px;
  border-top:0.5px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-l{
  font-size:11px;
  letter-spacing:0.5em;
  color:var(--faint);
  cursor:pointer;
  user-select:none;
  transition:color 0.3s,letter-spacing 0.4s;
  text-transform:lowercase;
}
.footer-l:hover{color:var(--red);letter-spacing:0.9em}

.footer-r{
  font-size:11px;
  letter-spacing:0.4em;
  color:var(--faint);
  user-select:none;
}

/* GARDEN MODAL */
.garden-modal{
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(240,232,224,0.88);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.garden-modal.open{
  opacity:1;
  pointer-events:all;
}
.garden-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:48px 56px;
  border:0.5px solid var(--border);
  background:rgba(240,232,224,0.95);
  text-align:center;
}
#flower-canvas{
  image-rendering:pixelated;
  width:80px;
  height:80px;
}
.garden-msg{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:0.3em;
  color:var(--text);
}
.garden-sub{
  font-size:8px;
  letter-spacing:0.5em;
  color:var(--faint);
  text-transform:lowercase;
}

/* REDACTION spans — starts as solid marker bar, reveals on hover */
.rc{
  display:inline;
  background:#1c0606;
  color:transparent !important;
  box-shadow:6px 0 0 5px #1c0606, -6px 0 0 5px #1c0606;
  border-radius:1px;
  position:relative;
  transition:background 0.08s, color 0.08s, box-shadow 0.08s;
  cursor:default;
}
.rc.shown{
  background:transparent !important;
  color:inherit !important;
  box-shadow:none !important;
}
/* larger spacing for the ORIGINS title */
.col-title .rc{
  box-shadow:9px 0 0 8px #1c0606, -9px 0 0 8px #1c0606;
}
.col-title .rc.shown{
  color:var(--text) !important;
  background:transparent !important;
  box-shadow:none !important;
}

/* OpenSea sailboat inner (shows page background through the circle) */
.os-boat{ fill:#f0e8e0; }

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:18px 24px}
  .hero{padding:60px 24px 48px}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .col-section{padding:36px 24px 0}
  footer{padding:24px}
  .cd-num{font-size:48px}
  .cd-sep{font-size:40px}
  .countdown{gap:8px}
}

@media(max-width:480px){
  .cd-num{font-size:36px}
  .cd-sep{font-size:30px}
  .countdown{gap:6px}
  .nav-mint{display:none}
}
</style>
</head>

<script>
// THREE-LAYER ATMOSPHERIC ASH SYSTEM
// Layer 1: Film grain (scattered pixels every frame)
// Layer 2: Brownian floating dust (300 particles, micro-drift)
// Layer 3: Slow visible falling specks (12 rare larger flakes)
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
let dustPts = [];
let slowFlakes = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ── LAYER 2: Brownian dust particle ──
function Dust() { this.reset(true); }
Dust.prototype.reset = function(init) {
  this.x  = Math.random() * W;
  this.y  = init ? Math.random() * H : Math.random() * H;
  this.vx = (Math.random() - 0.5) * 0.18;
  this.vy = -0.02 + Math.random() * 0.08;
  this.sz = Math.random() > 0.82 ? 2 : 1;
  this.ember = Math.random() > 0.91;
  this.baseOp = 0.28 + Math.random() * 0.42;  // much higher — dark on light needs it
  this.lt  = Math.random() * Math.PI * 2;
  this.lts = 0.008 + Math.random() * 0.02;
  if (this.ember) {
    this.r = 175 + Math.floor(Math.random() * 40);
    this.g = 55  + Math.floor(Math.random() * 30);
    this.b = 15  + Math.floor(Math.random() * 20);
  } else {
    const v = 25 + Math.floor(Math.random() * 55);
    this.r = v; this.g = v - 6; this.b = v - 10;
  }
};
Dust.prototype.step = function() {
  // brownian: small random nudge every frame
  this.vx += (Math.random() - 0.5) * 0.06;
  this.vy += (Math.random() - 0.5) * 0.03 + 0.003;
  this.vx *= 0.96; // dampen
  this.vy *= 0.97;
  this.x  += this.vx;
  this.y  += this.vy;
  this.lt += this.lts;
  // wrap edges
  if (this.x < -4) this.x = W + 4;
  if (this.x > W + 4) this.x = -4;
  if (this.y > H + 4) this.y = -4;
  if (this.y < -4) this.y = H + 4;
};
Dust.prototype.paint = function() {
  const flicker = 0.55 + 0.45 * Math.abs(Math.sin(this.lt));
  ctx.globalAlpha = this.baseOp * flicker;
  ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;
  ctx.fillRect(this.x, this.y, this.sz, this.sz);
};

// ── LAYER 3: Falling ash specks — top to bottom ──
function Speck() { this.reset(true); }
Speck.prototype.reset = function(init) {
  this.x   = (Math.random() * (W + 60)) - 30;
  this.y   = init ? Math.random() * H : -(5 + Math.random() * 30);
  this.vy  = 0.25 + Math.random() * 0.9;   // noticeable fall speed
  this.vx  = (Math.random() - 0.5) * 0.3;
  this.wt  = Math.random() * Math.PI * 2;
  this.wts = 0.005 + Math.random() * 0.01;
  this.wta = 0.08 + Math.random() * 0.22;
  this.sz  = Math.random() > 0.85 ? 2 : 1;
  this.ember = Math.random() > 0.87; // ~13% ember orange-red
  if (this.ember) {
    this.op = 0.45 + Math.random() * 0.35;
    this.r = 175 + Math.floor(Math.random() * 40);
    this.g = 50  + Math.floor(Math.random() * 30);
    this.b = 10  + Math.floor(Math.random() * 20);
  } else {
    this.op = 0.35 + Math.random() * 0.40;
    const v = 22 + Math.floor(Math.random() * 55);
    this.r = v; this.g = v - 5; this.b = v - 9;
  }
};
Speck.prototype.step = function() {
  this.wt += this.wts;
  this.x  += this.vx + Math.sin(this.wt) * this.wta;
  this.y  += this.vy;
  if (this.y > H + 15 || this.x < -40 || this.x > W + 40) this.reset(false);
};
Speck.prototype.paint = function() {
  ctx.globalAlpha = this.op;
  ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;
  ctx.fillRect(this.x, this.y, this.sz, this.sz);
};

function initParticles() {
  dustPts    = Array.from({ length: 550 }, () => new Dust());
  slowFlakes = Array.from({ length: 220 }, () => new Speck());
}

// ── LAYER 1: Film grain (drawn in batches by color) ──
function drawGrain() {
  const n = Math.floor(W * H * 0.014);
  const nEmber = Math.floor(n * 0.08);  // bumped up ember %
  const nDark  = Math.floor(n * 0.38);
  const nMid   = Math.floor(n * 0.34);
  const nLight = n - nEmber - nDark - nMid;

  ctx.fillStyle = 'rgba(185,55,18,0.72)';
  for (let i = 0; i < nEmber; i++)
    ctx.fillRect(Math.random() * W | 0, Math.random() * H | 0, 1, 1);

  ctx.fillStyle = 'rgba(22,12,10,0.65)';
  for (let i = 0; i < nDark; i++)
    ctx.fillRect(Math.random() * W | 0, Math.random() * H | 0, 1, 1);

  ctx.fillStyle = 'rgba(68,50,44,0.52)';
  for (let i = 0; i < nMid; i++)
    ctx.fillRect(Math.random() * W | 0, Math.random() * H | 0, 1, 1);

  ctx.fillStyle = 'rgba(98,80,74,0.38)';
  for (let i = 0; i < nLight; i++)
    ctx.fillRect(Math.random() * W | 0, Math.random() * H | 0, 1, 1);
}

function loop() {
  // ivory base
  ctx.fillStyle = '#f0e8e0';
  ctx.fillRect(0, 0, W, H);

  // layer 1 — film grain (changes every frame)
  drawGrain();

  // layer 2 — floating brownian dust
  ctx.globalAlpha = 1;
  dustPts.forEach(p => { p.step(); p.paint(); });

  // layer 3 — slow visible falling specks
  slowFlakes.forEach(s => { s.step(); s.paint(); });

  ctx.globalAlpha = 1;
  requestAnimationFrame(loop);
}

resize(); initParticles(); loop();

// SCRAMBLE
const SYM = '!@#∎◈◯†❧∅|/\\?~—·x01';
function scramble(el, final, ms) {
  clearInterval(el._s);
  let i = 0;
  el._s = setInterval(() => {
    el.textContent = final.split('').map((c, j) => {
      if (j < i) return c;
      return c === ' ' ? ' ' : SYM[Math.floor(Math.random() * SYM.length)];
    }).join('');
    if (++i > final.length) { el.textContent = final; clearInterval(el._s); }
  }, ms / final.length);
}

function setupRedaction(el) {
  let timers = [];
  function clearT() { timers.forEach(clearTimeout); timers = []; }

  el.addEventListener('mouseenter', () => {
    clearT();
    el.querySelectorAll('.rc').forEach((s, i) => {
      timers.push(setTimeout(() => s.classList.add('shown'), i * 48));

  });

  el.addEventListener('mouseleave', () => {
    clearT();
    [...el.querySelectorAll('.rc')].reverse().forEach((s, i) => {
      timers.push(setTimeout(() => s.classList.remove('shown'), i * 42));
    });
  });
}

// COUNTDOWN CLOCK
function nextDrop() {
  const now = new Date();
  let t = new Date(now.getFullYear(), now.getMonth(), 13, 13, 0, 0, 0);
  if (now >= t) t = new Date(now.getFullYear(), now.getMonth() + 1, 13, 13, 0, 0, 0);
  return t;
}
function tick() {
  const diff = nextDrop() - Date.now();
  if (diff < 0) return;
  document.getElementById('cd-d').textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
  document.getElementById('cd-h').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
  document.getElementById('cd-m').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  document.getElementById('cd-s').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
}

function drawFlower() {
  const fc = document.getElementById('flower-canvas');
  const fx = fc.getContext('2d');

  // Draw at 16x16 then scale to 80x80 for pixel art look
  const tmp = document.createElement('canvas');
  tmp.width = 16; tmp.height = 16;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#1a0a0a'; // near black outline

  // Simple bloom — 6 petals (outline rings) around a center ring
  // Each petal is a small circle outline, center ring is slightly larger
  const cx = 7.5, cy = 7.5;
  const petalDist = 3.8;
  const petalR = 2.2;
  const centerR = 1.8;

  // draw a circle outline as filled pixel squares on the small canvas
  function ring(px, py, r) {
    for (let dy = -Math.ceil(r)-1; dy <= Math.ceil(r)+1; dy++) {
      for (let dx = -Math.ceil(r)-1; dx <= Math.ceil(r)+1; dx++) {
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d >= r - 0.65 && d <= r + 0.15) {
          const px2 = Math.round(px + dx);
          const py2 = Math.round(py + dy);
          if (px2 >= 0 && px2 < 16 && py2 >= 0 && py2 < 16) {
            tc.fillRect(px2, py2, 1, 1);
          }
        }
      }
    }
  }

  // 6 petal outlines
  [0, 60, 120, 180, 240, 300].forEach(deg => {
    const rad = deg * Math.PI / 180;
    ring(cx + Math.cos(rad) * petalDist, cy + Math.sin(rad) * petalDist, petalR);
  });

  // center ring
  ring(cx, cy, centerR);

  // stem — 3 pixels down then angling
  [[7,11],[7,12],[7,13],[6,14],[6,15]].forEach(([x,y]) => tc.fillRect(x,y,1,1));

  // scale up with hard pixel rendering
  fx.imageSmoothingEnabled = false;
  fx.clearRect(0, 0, 80, 80);
  fx.drawImage(tmp, 0, 0, 16, 16, 0, 0, 80, 80);
}
